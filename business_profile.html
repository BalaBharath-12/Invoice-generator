<!DOCTYPE html>
<html>
<head>
    <title>Business Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Business Profile</span>
    <a href="/dashboard" class="btn btn-secondary">Back</a>
</nav>

<div class="container mt-4">

    <!-- Form Section -->
    <div class="card shadow-lg p-4 mb-4">
        <h4 class="fw-bold mb-3">Company Details</h4>

        <form method="POST">
            <div class="mb-3">
                <input type="text" name="company_name" class="form-control"
                       placeholder="Company Name"
                       value="{{ profile[1] if profile else '' }}" required>
            </div>

            <div class="mb-3">
                <textarea name="address" class="form-control"
                          placeholder="Company Address" required>{{ profile[2] if profile else '' }}</textarea>
            </div>

            <div class="mb-3">
                <input type="text" name="tax_number" class="form-control"
                       placeholder="Tax Number / GST"
                       value="{{ profile[3] if profile else '' }}">
            </div>

            <button type="submit" class="btn btn-success">
                Save Details
            </button>
        </form>
    </div>

    <!-- Display Section -->
    {% if profile %}
    <div class="card shadow-lg p-4">
        <h4 class="fw-bold mb-3">Saved Company Details</h4>
        <p><strong>Company:</strong> {{ profile[1] }}</p>
        <p><strong>Address:</strong> {{ profile[2] }}</p>
        <p><strong>Tax Number:</strong> {{ profile[3] }}</p>
    </div>
    {% endif %}

</div>

</body>
</html>
