<!DOCTYPE html>
<html>
<head>
    <title>Create Invoice</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Create Invoice</span>
    <a href="/dashboard" class="btn btn-secondary">Back</a>
</nav>

<div class="container mt-5">
    <div class="card shadow-lg p-4 mx-auto" style="max-width: 950px;">
        <h4 class="fw-bold mb-4 text-center">New Invoice</h4>

        <form method="POST" action="{{ url_for('create_invoice') }}">

            <!-- Invoice Info -->
            <div class="mb-3">
                <label class="form-label">Invoice Number</label>
                <input type="text" name="invoice_number" class="form-control" required>
            </div>

            <!-- NEW DATE FIELD -->
            <div class="mb-3">
                <label class="form-label">Invoice Date</label>
                <input type="date" name="invoice_date" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Client Name</label>
                <input type="text" name="client" class="form-control" required>
            </div>

            <div class="mb-3">
                <label class="form-label">Billing Address</label>
                <textarea name="billing_address" class="form-control" rows="3" required></textarea>
            </div>

            <div class="mb-3">
                <label class="form-label">GSTIN Number</label>
                <input type="text" name="gstin" class="form-control" required>
            </div>

            <hr>

            <h5 class="mb-3">Products</h5>

            <div id="products">

                <div class="product-line row mb-3 align-items-center">

                    <div class="col">
                        <input type="text" name="product[]" placeholder="Product"
                               class="form-control" required>
                    </div>

                    <div class="col">
                        <input type="number" name="quantity[]" placeholder="Qty"
                               class="form-control qty"
                               value="1" min="1"
                               required oninput="calculateTotals()">
                    </div>

                    <div class="col">
                        <input type="number" step="0.01" name="unit_price[]"
                               placeholder="Unit Price"
                               class="form-control price"
                               min="0"
                               required oninput="calculateTotals()">
                    </div>

                    <div class="col">
                        <input type="number" step="0.01" name="tax[]"
                               placeholder="Tax %"
                               class="form-control tax"
                               min="0"
                               required oninput="calculateTotals()">
                    </div>

                    <div class="col">
                        <input type="text"
                               class="form-control item-total"
                               placeholder="Total"
                               readonly>
                    </div>

                </div>

            </div>

            <button type="button" class="btn btn-info mb-3"
                    onclick="addProduct()">+ Add Another Product</button>

            <hr>

            <!-- Totals Section -->
            <div class="row">
                <div class="col text-end">
                    <p><strong>Subtotal:</strong> ₹ <span id="subtotal">0.00</span></p>
                    <p><strong>Total Tax:</strong> ₹ <span id="totalTax">0.00</span></p>
                    <h5><strong>Grand Total:</strong> ₹ <span id="grandTotal">0.00</span></h5>
                </div>
            </div>

            <button type="submit" class="btn btn-success w-100">
                Save Invoice
            </button>

        </form>
    </div>
</div>

<script>

function addProduct() {
    const container = document.getElementById("products");

    const div = document.createElement("div");
    div.classList.add("product-line", "row", "mb-3", "align-items-center");

    div.innerHTML = `
        <div class="col">
            <input type="text" name="product[]" placeholder="Product"
                   class="form-control" required>
        </div>

        <div class="col">
            <input type="number" name="quantity[]" placeholder="Qty"
                   class="form-control qty"
                   value="1" min="1"
                   required oninput="calculateTotals()">
        </div>

        <div class="col">
            <input type="number" step="0.01" name="unit_price[]"
                   placeholder="Unit Price"
                   class="form-control price"
                   min="0"
                   required oninput="calculateTotals()">
        </div>

        <div class="col">
            <input type="number" step="0.01" name="tax[]"
                   placeholder="Tax %"
                   class="form-control tax"
                   min="0"
                   required oninput="calculateTotals()">
        </div>

        <div class="col">
            <input type="text"
                   class="form-control item-total"
                   placeholder="Total"
                   readonly>
        </div>

        <div class="col-1">
            <button type="button"
                    class="btn btn-danger btn-sm"
                    onclick="removeProduct(this)">X</button>
        </div>
    `;

    container.appendChild(div);
}

function removeProduct(button) {
    button.closest(".product-line").remove();
    calculateTotals();
}

function calculateTotals() {

    let subtotal = 0;
    let totalTax = 0;

    const rows = document.querySelectorAll(".product-line");

    rows.forEach(row => {

        const qty = parseFloat(row.querySelector(".qty").value) || 0;
        const price = parseFloat(row.querySelector(".price").value) || 0;
        const taxPercent = parseFloat(row.querySelector(".tax").value) || 0;

        const itemTotal = qty * price;
        const taxAmount = itemTotal * (taxPercent / 100);

        subtotal += itemTotal;
        totalTax += taxAmount;

        row.querySelector(".item-total").value =
            (itemTotal + taxAmount).toFixed(2);

    });

    document.getElementById("subtotal").innerText = subtotal.toFixed(2);
    document.getElementById("totalTax").innerText = totalTax.toFixed(2);
    document.getElementById("grandTotal").innerText = (subtotal + totalTax).toFixed(2);

}

</script>

</body>
</html>
