<!DOCTYPE html>
<html>
<head>
    <title>Clients</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<nav class="navbar navbar-dark bg-dark px-4">
    <span class="navbar-brand">Client Management</span>
    <a href="/dashboard" class="btn btn-secondary">Back</a>
</nav>

<div class="container mt-4">

    <!-- Add New Client -->
    <div class="card shadow-lg p-4 mb-4">
        <h4 class="fw-bold mb-3">Add New Client</h4>

        <form method="POST">
            <div class="mb-3">
                <input type="text" name="name" class="form-control" placeholder="Client Name" required>
            </div>

            <div class="mb-3">
                <input type="email" name="email" class="form-control" placeholder="Client Email" required>
            </div>

            <div class="mb-3">
                <input type="text" name="phone" class="form-control" placeholder="Phone Number">
            </div>

            <div class="mb-3">
                <textarea name="address" class="form-control" placeholder="Address"></textarea>
            </div>

            <button type="submit" class="btn btn-success">Add Client</button>
        </form>
    </div>

    <!-- Client List -->
    <div class="card shadow-lg p-4">
        <h4 class="fw-bold mb-3">Client List</h4>

        {% if clients %}
        <table class="table table-bordered table-striped">
            <thead class="table-dark">
                <tr>
                    <th>ID</th>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Phone</th>
                    <th>Action</th> <!-- NEW COLUMN -->
                </tr>
            </thead>
            <tbody>
                {% for client in clients %}
                <tr>
                    <td>{{ client[0] }}</td>
                    <td>{{ client[1] }}</td>
                    <td>{{ client[2] }}</td>
                    <td>{{ client[3] }}</td>
                    <td>
                        <a href="/delete_client/{{ client[0] }}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('Are you sure you want to delete this client?')">
                           Delete
                        </a>
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
        {% else %}
        <p class="text-muted">No clients added yet.</p>
        {% endif %}
    </div>

</div>

</body>
</html>
